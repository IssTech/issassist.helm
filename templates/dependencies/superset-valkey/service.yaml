{{- if .Values.superset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: superset-valkey
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: superset
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 6379
      nodePort: 30106
  selector:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: superset
{{- end }}