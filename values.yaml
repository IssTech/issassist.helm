global:
  # The public domain name of IssAssist.
  publicDomainName: "localhost"
  publicPort: 443
  # The port of the API that user's browsers/clients use to access the API.
  publicApiPort: 443
  publicScheme: https
  # Base path of IssAssist.
  # Should NOT end with "/".
  # Examples: "", "/issassist", "/issassist/demo"
  basePath: ""

  # The main administrative account
  adminAccount:
    username: admin
    # This must be a valid email address.
    email: user@isstech.io
    # The timezone of the admin account.
    # Warning: This option only works on IssAssist, and not PgAdmin or other
    # side-tools.
    timezone: "Europe/Stockholm"
    # Whether to lock the password of the admin account such that it cannot
    # be changed. This option will reset the admin password to the one defined
    # in the Kubernetes secret `admin-auth` if it's different.
    #
    # Note: If you have changed your password, and lost the new one,
    # set this option to true to reset the password to the value of
    # `admin-auth.password`.
    #
    # Warning: This only works on IssAssist, and not PgAdmin or other
    # side-tools.
    lockPassword: false

  # Lifetimes of internal certificates
  certDuration: 8760h  # 1 year
  caCertDuration: 87600h  # 10 years

  # Priority class of IssAssist components.
  priorityClass: ~

  # Ingress
  ingress:
    ingressClass: nginx

    # TLS certificate settings
    tls:
      # Issuer type. Can be:
      # - cluster (uses cert-manager.io/cluster-issuer annotation)
      # - issuer (uses cert-manager.io/issuer annotation)
      # - disabled (disables public certificate usage and use a built-in
      #             self-signed certificate instead)
      issuerType: "disabled"
      # Issuer or ClusterIssuer name.
      issuer: ""

api:
  enabled: true
  image: 'ghcr.io/isstech/issassist-api:1.3'

  service:
    # Can be "ClusterIP", "NodePort" or "LoadBalancer".
    type: ClusterIP
    port: 8000
    # Define this if type="NodePort":
    # nodePort: 30000

  mail:
    smtpHost: ""
    smtpPort: 25
    smtpTLS: true
    smtpUsername: ""
    smtpPassword: ""
    fromEmailAddress: ""
    fromName: ""

  postgres:
    storageClass: ~
    volumeSize: "10Gi"

  valkey:
    storageClass: ~
    volumeSize: "1Gi"

webGUI:
  enabled: true
  replicas: 3
  image: 'ghcr.io/isstech/issassist-webgui:1.3'

  service:
    # Can be "ClusterIP", "NodePort" or "LoadBalancer".
    type: ClusterIP
    port: 8000
    # Define this if type="NodePort":
    # nodePort: 30001

tsmAgent:
  enabled: true
  replicas: 3
  image: 'ghcr.io/isstech/issassist-tsm-agent:1.3'

  service:
    # Can be "ClusterIP", "NodePort" or "LoadBalancer".
    type: ClusterIP
    port: 50051
    # Define this if type="NodePort":
    # nodePort: 30002

  tsmClientImage:
    buildSchedule: "0 0 * * 1"  # Every Monday, 00:00

  restoreTests:
    # Storage class for restore test volumes.
    # Recommendation: prioritize capacity over random I/O performance.
    storageClass: ~
    # Priority class of the restore test pods.
    # This should be less than any default priority class of the cluster, and
    # less than `global.priorityClass`.
    priorityClass: ~
    # Metadata volume settings. This volume is used to store metadata
    # (not restored files) during restore testing.
    metadataVolume:
      # Note: Suffixing with "B" here is obligatory.
      size: "1GiB"
    # Restore volume settings. This volume holds restored inodes as well as
    # some metadata during restore testing.
    restoreVolume:
      # The restore volume is used to store restored inodes as well as some
      # metadata (not restored files) during restore testing.
      # The size of the volume is defined using the formula:
      # `constant + dsmc_reported_size + (file_count * EFS) +
      # (dir_count * EDS).
      # EFS := "Extra File Size" and EDS := "Extra Directory Size".
      # Note: Suffixing with "B" here is obligatory.
      sizeConstant: "1GiB"
      extraFileSize: "4KiB"
      extraDirectorySize: "4KiB"

  postgres:
    storageClass: ~
    volumeSize: "20Gi"

  valkey:
    storageClass: ~
    volumeSize: "1Gi"

# PgAdmin is a tool used to access the PostgreSQL databases in IssAssist
# directly. It is hosted under /pgadmin if enabled.
pgAdmin:
  enabled: false

  ingress:
    enabled: true
    annotations: { }

imageCredentials:
  registry: "ghcr.io"
  username: "your_github_username"
  password: "your_pat_token"


##################
## Dependencies ##
##################

kubernetes-secret-generator:
  installCRDs: true
  global:
    imageRegistry:
    imagePullSecrets:

  image:
    registry: quay.io
    repository: mittwald/kubernetes-secret-generator
    # if no tag is given, the chart's appVersion is used
    tag: "v3.4.1"
    pullPolicy: Always
    pullSecrets: [ ]

  args: [ ]

  nameOverride: ""
  fullnameOverride: "secret-generator"
  deploymentStrategy: "Recreate"

  automountServiceAccountToken:

  serviceAccount:
    automountServiceAccountToken:
    # Specifies whether a service account should be created
    create: true
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name:

  podSecurityContext:
    { }
  # fsGroup: 2000

  priorityClassName: ""

  securityContext:
    { }
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  resources:
     limits:
       cpu: 100m
       memory: 128Mi
     requests:
       cpu: 100m
       memory: 128Mi

  nodeSelector: { }

  tolerations: [ ]

  affinity: { }

  # Regenerate secrets that have been generated by an old version of kubernetes-secret-generator and
  # are not cryptographically secure
  regenerateInsecure: "true"

  # Length of the generated secrets
  secretLength: 40

  # Namespace that are watched for secret generation
  # Accepts a comma-separated list of namespaces: ns1,ns2
  # If set to "", all namespaces will be watched
  # Accessing secrets in namespaces other than the deployed one requires permissions via a cluster role (on by default)
  watchNamespace: ""

  useMetricsService: false

  volumeMounts: [ ]

  volumes: [ ]

  # RBAC parameteres
  # https://kubernetes.io/docs/reference/access-authn-authz/rbac/
  rbac:
    # Disables creation of rbac resources
    create: true
    # The cluster role allows access to all namespaces in the cluster.
    # Set to false to restrict access to the deployed namespace only.
    # ClusterRole is deployed by Default
    clusterRole: true

  livenessProbe:
    enabled: true
    initialDelaySeconds: 6
    periodSeconds: 3
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 6
    periodSeconds: 3
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

superset:
  enabled: false

  # -- Provide a name to override the name of the chart
  nameOverride: ~
  # -- Provide a name to override the full names of resources
  fullnameOverride: superset

  # -- Labels to be added to all resources
  extraLabels: { }

  # -- User ID directive. This user must have enough permissions to run the bootstrap script
  # Running containers as root is not recommended in production. Change this to another UID - e.g. 1000 to be more secure
  runAsUser: 1000

  # Disable auto-generated superset-env secret. We create our own.
  secretEnv:
    create: false

  # -- Specify service account name to be used
  serviceAccountName: ~
  serviceAccount:
    # -- Create custom service account for Superset. If create: true and serviceAccountName is not provided, `superset.fullname` will be used.
    create: false
    annotations: { }

  # -- Install additional packages and do any other bootstrap configuration in this script
  # For production clusters it's recommended to build own image with this step done in CI
  # @default -- see `values.yaml`
  bootstrapScript: |
    #!/bin/bash
    if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

  # -- The name of the secret which we will use to generate a superset_config.py file
  # Note: this secret must have the key superset_config.py in it and can include other files as well
  configFromSecret: '{{ template "superset.fullname" . }}-config'

  # -- The name of the secret which we will use to populate env vars in deployed pods
  # This can be useful for secret keys, etc.
  envFromSecret: 'superset-env'
  # -- This can be a list of templated strings
  envFromSecrets: [ ]

  # -- Extra environment variables that will be passed into pods
  extraEnv:
    SUPERSET_APP_ROOT: "/superset"
    # APPLICATION_ROOT: ""
    # STATIC_ASSETS_PREFIX: ""
    ENABLE_PROXY_FIX: "True"
    # Different gunicorn settings, refer to the gunicorn documentation
    # https://docs.gunicorn.org/en/stable/settings.html#
    # These variables are used as Flags at the gunicorn startup
    # https://github.com/apache/superset/blob/master/docker/run-server.sh#L22
    # Extend timeout to allow long-running queries.
    # GUNICORN_TIMEOUT: 300
    # Increase the gunicorn worker amount, can improve performance drastically
    # See: https://docs.gunicorn.org/en/stable/design.html#how-many-workers
    # SERVER_WORKER_AMOUNT: 4
    # WORKER_MAX_REQUESTS: 0
    # WORKER_MAX_REQUESTS_JITTER: 0
    # SERVER_THREADS_AMOUNT: 20
    # GUNICORN_KEEPALIVE: 2
    # SERVER_LIMIT_REQUEST_LINE: 0
    # SERVER_LIMIT_REQUEST_FIELD_SIZE: 0

    # OAUTH_HOME_DOMAIN: ...
    # # If a whitelist is not set, any address that can use your OAuth2 endpoint will be able to login.
  # #   this includes any random Gmail address if your OAuth2 Web App is set to External.
  # OAUTH_WHITELIST_REGEX: ...

  # -- Extra environment variables in RAW format that will be passed into pods
  extraEnvRaw:
    - name: ADMIN_USERNAME
      valueFrom:
        secretKeyRef:
          name: admin-auth
          key: "username"
    - name: ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: admin-auth
          key: "password"
    # Load DB password from other secret (e.g. for zalando operator)
    # - name: DB_PASS
    #   valueFrom:
    #     secretKeyRef:
  #       name: superset.superset-postgres.credentials.postgresql.acid.zalan.do
  #       key: password

  # -- Extra environment variables to pass as secrets
  extraSecretEnv: { }
    # MAPBOX_API_KEY: ...
    # # Google API Keys: https://console.cloud.google.com/apis/credentials
    # GOOGLE_KEY: ...
    # GOOGLE_SECRET: ...
  #   # Generate your own secret key for encryption. Use openssl rand -base64 42 to generate a good key
  #  SUPERSET_SECRET_KEY: 'CHANGE_ME_TO_A_COMPLEX_RANDOM_SECRET'

  # -- Extra files to be mounted as ConfigMap on the path specified in `extraConfigMountPath`
  extraConfigs:
    tsm-agent-datasource.yaml: |
      databases:
        - database_name: IssAssist TSM Agent
          sqlalchemy_uri: postgresql+psycopg2://USERNAME:PASSWORD@tsm-agent-postgres:5432/tsm-agent?sslmode=require
          cache_timeout: null
          expose_in_sqllab: true
          allow_run_async: false
          allow_ctas: false
          allow_cvas: false
          allow_dml: false
          allow_csv_upload: false
          extra: "{\"allows_virtual_table_explore\": true}"
          impersonate_user: false
          configuration_method: dynamic_form
          uuid: 6d35d0a9-5d77-4fda-91c6-f769f1d9adf3
          version: 1.0.0

    # import_datasources.yaml: |
    #     databases:
    #     - allow_file_upload: true
    #       allow_ctas: true
    #       allow_cvas: true
    #       database_name: example-db
    #       extra: "{\r\n    \"metadata_params\": {},\r\n    \"engine_params\": {},\r\n    \"\
    #         metadata_cache_timeout\": {},\r\n    \"schemas_allowed_for_file_upload\": []\r\n\
    #         }"
    #       sqlalchemy_uri: example://example-db.local
    #       tables: []

  # -- Extra files to be mounted as Secrets on the path specified in `configMountPath`
  extraSecrets: { }

  extraVolumes:
    - name: tsm-agent-postgres-auth
      secret:
        secretName: tsm-agent-postgres-auth
    - name: admin-auth
      secret:
        secretName: admin-auth
    # - name: customConfig
    #   configMap:
    #     name: '{{ template "superset.fullname" . }}-custom-config'
    # - name: additionalSecret
    #   secret:
  #     secretName: my-secret
  #     defaultMode: 0600

  extraVolumeMounts:
    - name: tsm-agent-postgres-auth
      mountPath: "/etc/tsm-agent/auth"
    # - name: customConfig
    #   mountPath: /mnt/config
    #   readOnly: true
  # - name: additionalSecret:
  #   mountPath: /mnt/secret

  # -- A dictionary of overrides to append at the end of superset_config.py - the name does not matter
  # WARNING: the order is not guaranteed
  # Files can be passed as helm --set-file configOverrides.my-override=my-file.py
  configOverrides:
    superset_root: |
      SUPERSET_APP_ROOT = "/superset"
      # APPLICATION_ROOT = ""
      # STATIC_ASSETS_PREFIX = ""
      ENABLE_PROXY_FIX = True
    # extend_timeout: |
    #    # Extend timeout to allow long-running queries.
    #    SUPERSET_WEBSERVER_TIMEOUT = ...
    # enable_oauth: |
    #   from flask_appbuilder.security.manager import (AUTH_DB, AUTH_OAUTH)
    #   AUTH_TYPE = AUTH_OAUTH
    #   OAUTH_PROVIDERS = [
    #       {
    #           "name": "google",
    #           "whitelist": [ os.getenv("OAUTH_WHITELIST_REGEX", "") ],
    #           "icon": "fa-google",
    #           "token_key": "access_token",
    #           "remote_app": {
    #               "client_id": os.environ.get("GOOGLE_KEY"),
    #               "client_secret": os.environ.get("GOOGLE_SECRET"),
    #               "api_base_url": "https://www.googleapis.com/oauth2/v2/",
    #               "client_kwargs": {"scope": "email profile"},
    #               "request_token_url": None,
    #               "access_token_url": "https://accounts.google.com/o/oauth2/token",
    #               "authorize_url": "https://accounts.google.com/o/oauth2/auth",
    #               "authorize_params": {"hd": os.getenv("OAUTH_HOME_DOMAIN", "")}
    #           }
    #       }
    #   ]
    #   # Map Authlib roles to superset roles
    #   AUTH_ROLE_ADMIN = 'Admin'
    #   AUTH_ROLE_PUBLIC = 'Public'
    #   # Will allow user self registration, allowing to create Flask users from Authorized User
    #   AUTH_USER_REGISTRATION = True
    #   # The default user self registration role
    #   AUTH_USER_REGISTRATION_ROLE = "Admin"
    # secret: |
  #   # Generate your own secret key for encryption. Use `openssl rand -base64 42` to generate a good key
  #   SECRET_KEY = 'CHANGE_ME_TO_A_COMPLEX_RANDOM_SECRET'

  # -- Same as above but the values are files
  configOverridesFiles: { }
  # extend_timeout: extend_timeout.py
  # enable_oauth: enable_oauth.py

  configMountPath: "/app/pythonpath"

  extraConfigMountPath: "/app/configs"

  image:
    repository: apache/superset
    tag: dbf5e1f-dev
    pullPolicy: IfNotPresent

  imagePullSecrets: [ ]

  initImage:
    repository: apache/superset
    tag: dockerize
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8088
    annotations: { }
    # cloud.google.com/load-balancer-type: "Internal"
    loadBalancerIP: ~
    nodePort:
      # -- (int)
      http: nil

  resources: { }
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # The limits below will apply to all Superset components. To set individual resource limitations refer to the pod specific values below.
    # The pod specific values will overwrite anything that is set here.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
  #   cpu: 100m
  #   memory: 128Mi

  # -- Custom hostAliases for all superset pods
  ## https://kubernetes.io/docs/tasks/network/customize-hosts-file-for-pods/
  hostAliases: [ ]
  # - hostnames:
  #   - nodns.my.lan
  #   ip: 18.27.36.45

  # Superset node configuration
  supersetNode:
    replicas:
      enabled: true
      replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
    # -- Sets the [pod disruption budget](https://kubernetes.io/docs/tasks/run-application/configure-pdb/) for supersetNode pods
    podDisruptionBudget:
      # -- Whether the pod disruption budget should be created
      enabled: false
      # -- If set, maxUnavailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      minAvailable: 1
      # -- If set, minAvailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      maxUnavailable: 1

    # -- Startup command
    # @default -- See `values.yaml`
    command:
      - "/bin/sh"
      - "-c"
      - >
        . {{ .Values.configMountPath }}/superset_bootstrap.sh; 
        /usr/bin/run-server.sh
    env: { }
    # -- If true, forces deployment to reload on each upgrade
    forceReload: false
    # -- Init containers
    # @default -- a container waiting for postgres
    initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /bin/sh
          - -c
          - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -timeout 120s

    # -- Launch additional containers into supersetNode pod
    extraContainers: [ ]
    # -- Annotations to be added to supersetNode deployment
    deploymentAnnotations: { }
    # -- Labels to be added to supersetNode deployment
    deploymentLabels: { }
    # -- Affinity to be added to supersetNode deployment
    affinity: { }
    # -- TopologySpreadConstrains to be added to supersetNode deployments
    topologySpreadConstraints: [ ]
    # -- Annotations to be added to supersetNode pods
    podAnnotations: { }
    # -- Labels to be added to supersetNode pods
    podLabels: { }
    startupProbe:
      httpGet:
        path: /superset/health
        port: http
      initialDelaySeconds: 15
      timeoutSeconds: 1
      failureThreshold: 60
      periodSeconds: 5
      successThreshold: 1
    livenessProbe:
      httpGet:
        path: /superset/health
        port: http
      initialDelaySeconds: 15
      timeoutSeconds: 1
      failureThreshold: 3
      periodSeconds: 15
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /superset/health
        port: http
      initialDelaySeconds: 15
      timeoutSeconds: 1
      failureThreshold: 3
      periodSeconds: 15
      successThreshold: 1
    # -- Resource settings for the supersetNode pods - these settings overwrite might existing values from the global resources object defined above.
    resources: { }
      # limits:
      #  cpu: 100m
      #  memory: 128Mi
      # requests:
    #  cpu: 100m
    #  memory: 128Mi
    podSecurityContext: { }
    containerSecurityContext: { }
    strategy: { }
      # type: RollingUpdate
      # rollingUpdate:
    #   maxSurge: 25%
    #   maxUnavailable: 25%

  # Superset Celery worker configuration
  supersetWorker:
    replicas:
      enabled: true
      replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
    # -- Sets the [pod disruption budget](https://kubernetes.io/docs/tasks/run-application/configure-pdb/) for supersetWorker pods
    podDisruptionBudget:
      # -- Whether the pod disruption budget should be created
      enabled: false
      # -- If set, maxUnavailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      minAvailable: 1
      # -- If set, minAvailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      maxUnavailable: 1
    # -- Worker startup command
    # @default -- a `celery worker` command
    command:
      - "/bin/sh"
      - "-c"
      - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; celery --app=superset.tasks.celery_app:app worker"
    # -- If true, forces deployment to reload on each upgrade
    forceReload: false
    # -- Init container
    # @default -- a container waiting for postgres and redis
    initContainers:
      - name: wait-for-postgres-redis
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /bin/sh
          - -c
          - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -wait "tcp://$REDIS_HOST:$REDIS_PORT" -timeout 120s
    # -- Launch additional containers into supersetWorker pod
    extraContainers: [ ]
    # -- Annotations to be added to supersetWorker deployment
    deploymentAnnotations: { }
    # -- Labels to be added to supersetWorker deployment
    deploymentLabels: { }
    # -- Affinity to be added to supersetWorker deployment
    affinity: { }
    # -- TopologySpreadConstrains to be added to supersetWorker deployments
    topologySpreadConstraints: [ ]
    # -- Annotations to be added to supersetWorker pods
    podAnnotations: { }
    # -- Labels to be added to supersetWorker pods
    podLabels: { }
    # -- Resource settings for the supersetWorker pods - these settings overwrite might existing values from the global resources object defined above.
    resources: { }
      # limits:
      #  cpu: 100m
      #  memory: 128Mi
      # requests:
    #  cpu: 100m
    #  memory: 128Mi
    podSecurityContext: { }
    containerSecurityContext: { }
    strategy: { }
      # type: RollingUpdate
      # rollingUpdate:
    #   maxSurge: 25%
    #   maxUnavailable: 25%
    livenessProbe:
      exec:
        # -- Liveness probe command
        # @default -- a `celery inspect ping` command
        command:
          - sh
          - -c
          - celery -A superset.tasks.celery_app:app inspect ping -d celery@$HOSTNAME
      initialDelaySeconds: 120
      timeoutSeconds: 60
      failureThreshold: 3
      periodSeconds: 60
      successThreshold: 1
    # -- No startup/readiness probes by default since we don't really care about its startup time (it doesn't serve traffic)
    startupProbe: { }
    # -- No startup/readiness probes by default since we don't really care about its startup time (it doesn't serve traffic)
    readinessProbe: { }
    # -- Set priorityClassName for supersetWorker pods
    priorityClassName: ~

  # Superset beat configuration (to trigger scheduled jobs like reports)
  supersetCeleryBeat:
    # -- This is only required if you intend to use alerts and reports
    enabled: true
    # -- Sets the [pod disruption budget](https://kubernetes.io/docs/tasks/run-application/configure-pdb/) for supersetCeleryBeat pods
    podDisruptionBudget:
      # -- Whether the pod disruption budget should be created
      enabled: false
      # -- If set, maxUnavailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      minAvailable: 1
      # -- If set, minAvailable must not be set - see https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
      maxUnavailable: 1
    # -- Command
    # @default -- a `celery beat` command
    command:
      - "/bin/sh"
      - "-c"
      - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid --schedule /tmp/celerybeat-schedule"
    # -- If true, forces deployment to reload on each upgrade
    forceReload: false
    # -- List of init containers
    # @default -- a container waiting for postgres
    initContainers:
      - name: wait-for-postgres-redis
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /bin/sh
          - -c
          - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -wait "tcp://$REDIS_HOST:$REDIS_PORT" -timeout 120s
    # -- Launch additional containers into supersetCeleryBeat pods
    extraContainers: [ ]
    # -- Annotations to be added to supersetCeleryBeat deployment
    deploymentAnnotations: { }
    # -- Affinity to be added to supersetCeleryBeat deployment
    affinity: { }
    # -- TopologySpreadConstrains to be added to supersetCeleryBeat deployments
    topologySpreadConstraints: [ ]
    # -- Annotations to be added to supersetCeleryBeat pods
    podAnnotations: { }
    # -- Labels to be added to supersetCeleryBeat pods
    podLabels: { }
    # -- Resource settings for the CeleryBeat pods - these settings overwrite might existing values from the global resources object defined above.
    resources: { }
      # limits:
      #  cpu: 100m
      #  memory: 128Mi
      # requests:
    #  cpu: 100m
    #  memory: 128Mi
    podSecurityContext: { }
    containerSecurityContext: { }
    # -- Set priorityClassName for CeleryBeat pods
    priorityClassName: ~

  init:
    # Configure resources
    # Warning: fab command consumes a lot of ram and can
    # cause the process to be killed due to OOM if it exceeds limit
    # Make sure you are giving a strong password for the admin user creation( else make sure you are changing after setup)
    # Also change the admin email to your own custom email.
    resources: { }
      # limits:
      #   cpu:
      #   memory:
      # requests:
    #   cpu:
    #   memory:
    # -- Command
    # @default -- a `superset_init.sh` command
    command:
      - "/bin/sh"
      - "-c"
      - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; . {{ .Values.configMountPath }}/superset_init.sh"
    enabled: true
    loadExamples: false
    createAdmin: true
    adminUser:
      username: admin
      firstname: Superset
      lastname: Admin
      email: admin@localhost
    # -- List of initContainers
    # @default -- a container waiting for postgres
    initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /bin/sh
          - -c
          - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -timeout 120s
    # -- A Superset init script
    # @default -- a script to create admin user and initialize roles
    initscript: |-
      #!/bin/sh
      set -eu
      echo "Upgrading DB schema..."
      superset db upgrade
      echo "Initializing roles..."
      superset init
      {{ if .Values.init.createAdmin }}
      echo "Creating admin user..."
      superset fab create-admin \
                      --username "$ADMIN_USERNAME" \
                      --firstname "$ADMIN_FIRSTNAME" \
                      --lastname "$ADMIN_LASTNAME" \
                      --email "$ADMIN_EMAIL" \
                      --password "$ADMIN_PASSWORD" \
                      || true
      {{- end }}
      {{ if .Values.init.loadExamples }}
      echo "Loading examples..."
      superset load_examples
      {{- end }}
      if [ -f "{{ .Values.extraConfigMountPath }}/tsm-agent-datasource.yaml" ]; then
        echo "Importing TSM Agent database connection.... "
        cp {{ .Values.extraConfigMountPath }}/tsm-agent-datasource.yaml /tmp/tsm-agent-datasource.yaml
        sed -i -e "s/USERNAME/$(cat /etc/tsm-agent/auth/username)/g" /tmp/tsm-agent-datasource.yaml
        sed -i -e "s/PASSWORD/$(cat /etc/tsm-agent/auth/password)/g" /tmp/tsm-agent-datasource.yaml
        superset import_datasources -p /tmp/tsm-agent-datasource.yaml
      fi
    # -- Launch additional containers into init job pod
    extraContainers: [ ]
    ## Annotations to be added to init job pods
    podAnnotations: { }
    # Labels to be added to init job pods
    podLabels: { }
    podSecurityContext: { }
    containerSecurityContext: { }
    ## Tolerations to be added to init job pods
    tolerations: [ ]
    ## Affinity to be added to init job pods
    affinity: { }
    # -- TopologySpreadConstrains to be added to init job
    topologySpreadConstraints: [ ]
    # -- Set priorityClassName for init job pods
    priorityClassName: ~

  valkey:
    storageClass: ~
    volumeSize: "1Gi"

  postgres:
    storageClass: ~
    volumeSize: "20Gi"

  # Disable Bitnami-supplied dependencies. We supply our own.
  postgresql:
    enabled: false

  redis:
    enabled: false
